name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build with PyInstaller
        run: uv run pyinstaller stockmonitor.spec --noconfirm

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Get version from tag
        id: get_version
        run: |
          $refName = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($refName)) {
            $refName = "v0.1.0-dev"
          }
          $version = $refName -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Build installer with Inno Setup
        run: |
          $env:STOCKMONITOR_VERSION = "${{ steps.get_version.outputs.VERSION }}"
          ISCC.exe installer/stockmonitor.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: StockMonitor-Setup
          path: dist/StockMonitor-Setup.exe

      - name: Create or Update Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: StockMonitor ${{ github.ref_name }}
          body: |
            ## StockMonitor ${{ github.ref_name }}
            
            ### 安装说明
            1. 下载 `StockMonitor-Setup.exe`
            2. 双击运行安装程序
            3. 按照向导完成安装
            
            ### 功能
            - Windows 股票悬浮条
            - 系统托盘图标
            - 自动刷新股票行情
            
            ### 系统要求
            - Windows 10 或更高版本
          files: |
            dist/StockMonitor-Setup.exe
          draft: false
          prerelease: false
